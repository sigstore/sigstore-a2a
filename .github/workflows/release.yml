name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for Sigstore OIDC

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install UV
        uses: astral-sh/setup-uv@803947b9bd8e9f986429fa0c5a41c367cd732b41 # v7.2.1
        with:
          version: "latest"

      - name: Cache UV dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
            %LOCALAPPDATA%\uv\cache
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv sync --prerelease=allow

      - name: Build package
        run: |
          uv build

      - name: Sign GeoRoute Agent Card
        env:
          UV_PRERELEASE: allow
        run: |
          uv run sigstore-a2a sign examples/georoute-agent.json \
            --output signed-georoute-agent.json \
            --repository ${{ github.repository }}

      - name: Sign Data Analysis Agent Card
        env:
          UV_PRERELEASE: allow
        run: |
          uv run sigstore-a2a sign examples/data-analysis-agent.json \
            --output signed-data-analysis-agent.json \
            --repository ${{ github.repository }}

      - name: Verify GeoRoute Agent Card
        env:
          UV_PRERELEASE: allow
        run: |
          uv run sigstore-a2a verify signed-georoute-agent.json \
            --repository ${{ github.repository }} \
            --workflow "${{ github.workflow }}"

      - name: Verify Data Analysis Agent Card
        env:
          UV_PRERELEASE: allow
        run: |
          uv run sigstore-a2a verify signed-data-analysis-agent.json \
            --repository ${{ github.repository }} \
            --workflow "${{ github.workflow }}"

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Release Notes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "This release includes cryptographically signed example Agent Cards demonstrating the sigstore-a2a signing process." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Verification" >> CHANGELOG.md
          echo "To verify the signed Agent Cards:" >> CHANGELOG.md
          echo "\`\`\`bash" >> CHANGELOG.md
          echo "sigstore-a2a verify signed-georoute-agent.json --repository ${{ github.repository }}" >> CHANGELOG.md
          echo "sigstore-a2a verify signed-data-analysis-agent.json --repository ${{ github.repository }}" >> CHANGELOG.md
          echo "\`\`\`" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Files" >> CHANGELOG.md
          echo "- \`signed-georoute-agent.json\` - Signed GeoRoute Agent Card" >> CHANGELOG.md
          echo "- \`signed-data-analysis-agent.json\` - Signed Data Analysis Agent Card" >> CHANGELOG.md
          echo "- Distribution packages in the Assets section below" >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          body_path: CHANGELOG.md
          files: |
            dist/*
            signed-georoute-agent.json
            signed-data-analysis-agent.json
          generate_release_notes: true
